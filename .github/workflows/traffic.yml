name: traffic

# Snapshots GitHub traffic (clones/views) + release download counts once a day
# and republishes the dashboard to GitHub Pages. GitHub erases traffic data
# older than 14 days, so the committed docs/data/history.json is the durable
# record.

on:
  schedule:
    - cron: "17 6 * * *"   # daily at 06:17 UTC
  workflow_dispatch: {}     # allow manual runs

permissions:
  contents: write   # push updated history.json; traffic API needs push access
  pages: write
  id-token: write

concurrency:
  group: traffic
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect traffic + download stats
        env:
          # A PAT with `repo` scope (TRAFFIC_TOKEN) is preferred; the built-in
          # token works too as long as `contents: write` is granted above.
          GITHUB_TOKEN: ${{ secrets.TRAFFIC_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: python3 scripts/collect_traffic.py

      - name: Commit updated history
        run: |
          git config user.name  "tokn-traffic-bot"
          git config user.email "actions@github.com"
          git add docs/data/history.json
          if git diff --cached --quiet; then
            echo "No changes to history.json"
          else
            git commit -m "chore(traffic): daily snapshot [skip ci]"
            git push
          fi

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main          # pick up the snapshot the collect job just pushed
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
